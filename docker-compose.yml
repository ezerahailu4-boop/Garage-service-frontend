version: "3.9"

# ─────────────────────────────────────────────────────────────
# Birhan Garage Management Platform — Docker Compose
# ─────────────────────────────────────────────────────────────

services:
  # ── Production build served via nginx ──────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: birhan-garage-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.garage.rule=Host(`${DOMAIN:-localhost}`)"
    networks:
      - garage-net

  # ── Dev server (hot reload) — use with `--profile dev` ─────
  dev:
    image: node:22-alpine
    container_name: birhan-garage-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: >
      sh -c "corepack enable &&
             corepack prepare pnpm@latest --activate &&
             pnpm install &&
             pnpm dev --host 0.0.0.0"
    profiles:
      - dev
    networks:
      - garage-net

networks:
  garage-net:
    driver: bridge
    name: birhan-garage-network
